<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인도네시아 O&G 물동량 인포그래픽</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── LIGHT THEME (default) ─────────────────────────── */
:root{
  --bg:#F4F6FA;--surface:#FFFFFF;--s2:#F0F2F7;
  --b1:rgba(0,0,0,.08);--b2:rgba(0,0,0,.13);
  --text:#0F172A;--muted:#374151;
  --green:#065F46;--blue:#1E3A8A;--purple:#4C1D95;
  --font:'IBM Plex Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace;
  --map-bg:#E8EFF7;
  --tt-bg:#FFFFFF;--tt-border:rgba(0,0,0,.12);--tt-cell:#F4F6FA;--tt-cl:#374151;--tt-shadow:rgba(0,0,0,.15);
  --rbtn-hover-border:rgba(0,0,0,.22);
  --on-s-bg:rgba(0,0,0,.06);--on-s-border:rgba(0,0,0,.22);--on-s-color:#1A2035;
  --toggle-track-off:rgba(0,0,0,.1);
  --bar-bg:rgba(0,0,0,.06);
  --sel-port-bg:rgba(109,79,187,.06);
  --comm-sel-bg:rgba(0,0,0,.03);
}
/* ── DARK THEME ─────────────────────────────────────── */
body.dark{
  --bg:#0B1120;--surface:#141C2E;--s2:#1C2640;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);
  --text:#EEF2FF;--muted:#94A3B8;
  --green:#22D3A5;--blue:#38AFFF;--purple:#A78BFA;
  --map-bg:#09111f;
  --tt-bg:#141C2E;--tt-border:rgba(255,255,255,.18);--tt-cell:#1C2640;--tt-cl:#7A8FB5;--tt-shadow:rgba(0,0,0,.65);
  --rbtn-hover-border:rgba(255,255,255,.25);
  --on-s-bg:rgba(255,255,255,.08);--on-s-border:rgba(255,255,255,.28);--on-s-color:#EEF2FF;
  --toggle-track-off:rgba(255,255,255,.12);
  --bar-bg:rgba(255,255,255,.05);
  --sel-port-bg:rgba(167,139,250,.07);
  --comm-sel-bg:rgba(255,255,255,.04);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;transition:background .25s,color .25s}
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;border-bottom:1px solid var(--b1);background:var(--surface);flex-shrink:0;gap:12px;transition:background .25s,border-color .25s}
#header h1{font-size:14px;font-weight:600;letter-spacing:-.3px}
#header p{font-size:10px;color:var(--muted);margin-top:2px}
#hstats{display:flex;gap:18px;flex-shrink:0;align-items:center}
.hs-lbl{font-size:9px;color:var(--muted)}
.hs-val{font-size:12px;font-weight:600;font-family:var(--mono)}

/* THEME TOGGLE BUTTON */
#theme-btn{font-size:11px;font-family:var(--font);font-weight:500;padding:4px 12px;border-radius:14px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
#theme-btn:hover{color:var(--text);border-color:var(--rbtn-hover-border)}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}
#map{flex:1}
.leaflet-container{background:var(--map-bg)!important;transition:background .25s}

/* LEFT PANEL */
#panel{width:248px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;transition:background .25s,border-color .25s}
#panel-top{padding:10px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sec-ttl{font-size:9px;color:var(--text);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
.btn-row{display:flex;gap:4px;margin-bottom:6px}
.btn-row:last-child{margin-bottom:0}
.rbtn{flex:1;font-size:11px;font-family:var(--font);font-weight:600;padding:4px 0;border-radius:14px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.rbtn:hover{color:var(--text);border-color:var(--rbtn-hover-border)}
.rbtn.on-t{background:rgba(109,79,187,.12);border-color:var(--purple);color:var(--purple)}
.rbtn.on-d{background:rgba(15,155,118,.12);border-color:var(--green);color:var(--green)}
.rbtn.on-i{background:rgba(26,127,212,.12);border-color:var(--blue);color:var(--blue)}
.rbtn.on-s{background:var(--on-s-bg);border-color:var(--on-s-border);color:var(--on-s-color)}
body.dark .rbtn.on-t{background:rgba(167,139,250,.18)}
body.dark .rbtn.on-d{background:rgba(34,211,165,.18)}
body.dark .rbtn.on-i{background:rgba(56,175,255,.18)}

/* MULTI-SELECT TOGGLE */
#multi-toggle-row{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--b1);flex-shrink:0;cursor:pointer;user-select:none}
#multi-toggle-row:hover{background:var(--s2)}
.toggle-track{width:28px;height:16px;border-radius:8px;background:var(--toggle-track-off);border:1px solid var(--b2);position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:all .2s}
.toggle-track.on{background:rgba(109,79,187,.35);border-color:var(--purple)}
.toggle-track.on .toggle-thumb{left:14px;background:var(--purple)}
body.dark .toggle-track.on{background:rgba(167,139,250,.4)}
.toggle-label{font-size:11px;font-weight:600;color:var(--muted)}
.toggle-track.on+.toggle-label{color:var(--purple)}

/* COMMODITY LIST */
#comm-wrap{flex:1;overflow-y:auto;padding:8px 10px}
#comm-wrap::-webkit-scrollbar{width:3px}
#comm-wrap::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.comm-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;cursor:pointer;transition:background .1s;margin-bottom:2px;border:1px solid transparent;user-select:none}
.comm-row:hover{background:var(--s2)}
.comm-row.selected{background:var(--comm-sel-bg);border-color:var(--b2)}
.comm-row.disabled{opacity:.35}
.chk-box{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.comm-row.selected .chk-box{border-color:currentColor}
.chk-svg{display:none;width:9px;height:9px}
.comm-row.selected .chk-svg{display:block}
.sw{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.comm-name{flex:1;font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comm-vol{font-size:9px;font-weight:600;color:var(--muted);font-family:var(--mono);flex-shrink:0}

/* LEGEND */
#legend{padding:7px 12px;border-top:1px solid var(--b1);display:flex;gap:12px;flex-shrink:0;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* RIGHT SIDEBAR */
#sidebar{width:230px;flex-shrink:0;overflow-y:auto;background:var(--surface);border-left:1px solid var(--b1);transition:background .25s,border-color .25s}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#sidebar-hd{padding:10px 13px 7px;border-bottom:1px solid var(--b1);font-size:9px;color:var(--text);font-weight:700;text-transform:uppercase;letter-spacing:.7px;position:sticky;top:0;background:var(--surface);z-index:1;transition:background .25s}
.port-row{display:flex;align-items:center;padding:6px 13px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;gap:7px}
.port-row:hover{background:var(--s2)}
.port-row.sel{background:var(--sel-port-bg);border-left:2px solid var(--purple)}
.pr-rank{font-family:var(--mono);font-size:10px;color:var(--muted);width:15px;flex-shrink:0;text-align:right}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-bar-wrap{height:2px;background:var(--bar-bg);border-radius:1px;margin-top:4px}
.pr-bar{height:2px;border-radius:1px;transition:width .3s}
.pr-total{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text);flex-shrink:0}

/* TOOLTIP */
.ctt{background:var(--tt-bg)!important;border:1px solid var(--tt-border)!important;border-radius:10px!important;padding:11px 13px!important;font-family:'IBM Plex Sans KR',sans-serif!important;color:var(--text)!important;box-shadow:0 8px 28px var(--tt-shadow)!important;min-width:185px}
.ctt::before{display:none!important}
.tt-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.tt-tag{display:inline-block;font-size:9px;padding:2px 5px;border-radius:8px;font-weight:500;margin:0 2px 3px 0}
.tt-tags{margin-bottom:7px}
.tt-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tt-cell{background:var(--tt-cell);border-radius:5px;padding:5px 7px}
.tt-cl{font-size:9px;font-weight:600;color:var(--tt-cl);margin-bottom:1px}
.tt-cv{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.tt-sep{border:none;border-top:1px solid var(--b1);margin:6px 0}
.tt-foot{display:flex;justify-content:space-between;align-items:center}
.tt-fl{font-size:10px;color:var(--muted)}
.tt-fv{font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--purple)}
</style>
</head>
<body>
<div id="app">
<div id="header">
  <div>
    <h1>🛢 인도네시아 항만별 O&amp;G 물동량</h1>
    <p>화물 선택에 따라 원 크기·순위가 실시간 반영됩니다</p>
  </div>
  <div id="hstats">
    <div><div class="hs-lbl">Domestic</div><div class="hs-val" style="color:var(--green)" id="st-dom">—</div></div>
    <div><div class="hs-lbl">International</div><div class="hs-val" style="color:var(--blue)" id="st-intl">—</div></div>
    <div><div class="hs-lbl">표시 항만</div><div class="hs-val" style="color:var(--muted)" id="st-cnt">—</div></div>
    <button id="theme-btn" onclick="toggleTheme()">🌙 다크</button>
  </div>
</div>

<div id="main">
<div id="panel">
  <div id="panel-top">
    <div class="sec-ttl">표시 기준</div>
    <div class="btn-row">
      <button class="rbtn on-t" id="mb-total" onclick="setMode('total')">전체</button>
      <button class="rbtn" id="mb-domestic" onclick="setMode('domestic')">Domestic</button>
      <button class="rbtn" id="mb-international" onclick="setMode('international')">Intl</button>
    </div>
    <div class="btn-row">
      <button class="rbtn on-s" id="sb-both" onclick="setSub('both')">전체</button>
      <button class="rbtn" id="sb-unloading" onclick="setSub('unloading')">하역</button>
      <button class="rbtn" id="sb-loading" onclick="setSub('loading')">선적</button>
    </div>
  </div>

  <!-- MULTI-SELECT TOGGLE + O&G PRESET + SELECT ALL -->
  <div style="display:flex;align-items:center;border-bottom:1px solid var(--b1);flex-shrink:0;gap:6px;padding-right:10px;">
    <div id="multi-toggle-row" onclick="toggleMulti()" style="flex:1;border-bottom:none;">
      <div class="toggle-track" id="multi-track"><div class="toggle-thumb"></div></div>
      <span class="toggle-label" id="multi-label">다중 선택</span>
    </div>
    <button id="og-comm-btn" onclick="toggleOgPreset()" style="
      font-size:10px;font-family:var(--font);font-weight:600;
      padding:4px 10px;border-radius:12px;
      border:1px solid var(--b2);background:transparent;
      color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
    ">O&amp;G 선택</button>
    <button id="all-comm-btn" onclick="toggleAllComms()" style="
      font-size:10px;font-family:var(--font);font-weight:600;
      padding:4px 10px;border-radius:12px;
      border:1px solid var(--b2);background:transparent;
      color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
    ">전체 선택</button>
  </div>

  <div id="comm-wrap">
    <div id="comm-list"></div>
  </div>

  <div id="legend">
    <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>Domestic</div>
    <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>International</div>
    <div class="leg"><span class="leg-dot" style="background:var(--purple)"></span>혼합</div>
  </div>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="sidebar-hd">항만 순위 (물동량 기준)</div>
  <div id="port-list"></div>
</div>
</div>
</div>


<script>
let ALL_PORT_DATA = {};
let COMMS = [];
let circles = [];
let selPort = null;
let PORTS = [];
let mode = 'total';
let sub  = 'both';
let multiMode = false;
let selComms = new Set();
const OG_COMMODITY_KEYS = [
  'CPO','PERTALITE','LPG','CRUDE OIL','FAME','BIO SOLAR','AVTUR','RBD PALM OLEIN',
  'PERTAMAX','RBD PALM OIL','MFO/HSFO','CONDENSATE','METHANOL','HSD','ASPAL/BITUMEN',
  'OLEIN','OMAN BLEND CRUDE OIL','PKO'
];

const map = L.map('map',{center:[-2, 118],zoom:5,zoomControl:true,attributionControl:true});

const TILES = {
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
  }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
  }),
};
let isDark = false;
TILES.light.addTo(map);

function colorForIndex(i, total) {
  const hue = Math.round((i * 360 / Math.max(total, 1)) % 360);
  return `hsl(${hue} 72% 55%)`;
}
function safeLabel(key) {
  return key === '기타' ? '기타' : key;
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  if (isDark) {
    TILES.light.remove();
    TILES.dark.addTo(map);
    document.getElementById('theme-btn').textContent = '☀️ 라이트';
  } else {
    TILES.dark.remove();
    TILES.light.addTo(map);
    document.getElementById('theme-btn').textContent = '🌙 다크';
  }
}
function fmt(n){ return (n||0).toLocaleString('ko-KR'); }
function fmtM(n){ return ((n||0)/1e6).toFixed(2)+'M'; }

function portCommVol(code, key) {
  const p = ALL_PORT_DATA[code];
  if (!p || !p.comms || !p.comms[key]) return null;
  return p.comms[key];
}
function sumPortComms(code, keys) {
  let dU=0,dS=0,iU=0,iS=0;
  keys.forEach(key => {
    const v = portCommVol(code, key);
    if (v) { dU += v.dU||0; dS += v.dS||0; iU += v.iU||0; iS += v.iS||0; }
  });
  return {dU,dS,iU,iS};
}
function buildPorts(keys) {
  const allKeys = COMMS.map(c=>c.key);
  const isAll = keys.length === allKeys.length;
  return Object.keys(ALL_PORT_DATA).map(code => {
    const meta = ALL_PORT_DATA[code];
    let t;
    if (isAll) {
      t = {dU: meta.dU, dS: meta.dS, iU: meta.iU, iS: meta.iS};
    } else {
      t = sumPortComms(code, keys);
    }
    if (t.dU+t.dS+t.iU+t.iS === 0) return null;
    return {code, name:meta.n, lat:meta.lat, lng:meta.lng, ...t};
  }).filter(Boolean);
}
function vol(p) {
  let d=0,i=0;
  if (sub!=='loading')   { d+=p.dU||0; i+=p.iU||0; }
  if (sub!=='unloading') { d+=p.dS||0; i+=p.iS||0; }
  if (mode==='domestic')      return d;
  if (mode==='international') return i;
  return d+i;
}
function domVol(p){ return (sub==='loading'?0:p.dU||0)+(sub==='unloading'?0:p.dS||0); }
function intlVol(p){ return (sub==='loading'?0:p.iU||0)+(sub==='unloading'?0:p.iS||0); }
function getColor(p) {
  if (mode==='domestic')      return '#22D3A5';
  if (mode==='international') return '#38AFFF';
  const d=domVol(p), i=intlVol(p);
  if (d>0 && i>0) return '#A78BFA';
  return i>d ? '#38AFFF' : '#22D3A5';
}
function ttHTML(p) {
  const selArr = [...selComms];
  const tags = selArr.slice(0,8).map(k=>{
    const c = COMMS.find(x=>x.key===k);
    return `<span class="tt-tag" style="background:${c.col}20;color:${c.col};border:1px solid ${c.col}40">${c.lbl}</span>`;
  }).join('') + (selArr.length>8 ? `<span class="tt-tag" style="background:#fff1;color:#7A8FB5">+${selArr.length-8}</span>` : '');
  const total = (p.dU||0) + (p.dS||0) + (p.iU||0) + (p.iS||0);
  return `<div class="tt-name">🛢 ${p.name} <span style="font-size:9px;color:#7A8FB5;font-weight:400">(${p.code})</span></div>
<div class="tt-tags">${tags}</div>
<div class="tt-grid">
  <div class="tt-cell"><div class="tt-cl">🟢 DOM 하역</div><div class="tt-cv" style="color:#22D3A5">${fmt(p.dU||0)}</div></div>
  <div class="tt-cell"><div class="tt-cl">🟢 DOM 선적</div><div class="tt-cv" style="color:#22D3A5">${fmt(p.dS||0)}</div></div>
  <div class="tt-cell"><div class="tt-cl">🔵 INTL 하역</div><div class="tt-cv" style="color:#38AFFF">${fmt(p.iU||0)}</div></div>
  <div class="tt-cell"><div class="tt-cl">🔵 INTL 선적</div><div class="tt-cv" style="color:#38AFFF">${fmt(p.iS||0)}</div></div>
</div>
<hr class="tt-sep">
<div class="tt-foot"><span class="tt-fl">선택 화물 전체 합계</span><span class="tt-fv">${fmt(total)} TON</span></div>`;
}
function renderCircles() {
  circles.forEach(c=>c.remove()); circles=[];
  if (!PORTS.length) return;
  const maxV = Math.max(...PORTS.map(p=>vol(p)), 1);
  [...PORTS].sort((a,b)=>vol(a)-vol(b)).forEach(p=>{
    const v = vol(p);
    if (v===0) return;
    const r = 4 + Math.sqrt(v/maxV) * 66;
    const color = getColor(p);
    const c = L.circleMarker([p.lat,p.lng],{
      radius:r, fillColor:color, color:'#fff', weight:1.5, opacity:.9, fillOpacity:.55
    });
    c.bindTooltip(ttHTML(p),{className:'ctt',sticky:true,offset:[14,0],opacity:1});
    c.on('click',()=>{
      selPort=p.code;
      renderSidebar();
      map.setView([p.lat,p.lng],Math.max(map.getZoom(),6),{animate:true});
    });
    c.addTo(map); circles.push(c);
  });
}
function renderSidebar() {
  const sorted=[...PORTS].sort((a,b)=>vol(b)-vol(a));
  const maxV=sorted.length ? (vol(sorted[0])||1) : 1;
  const list=document.getElementById('port-list'); list.innerHTML='';
  let rank=0;
  sorted.forEach(p=>{
    const v=vol(p); if(v===0) return; rank++;
    const color=getColor(p);
    const row=document.createElement('div');
    row.className='port-row'+(p.code===selPort?' sel':'');
    row.innerHTML=`<span class="pr-rank">${rank}</span>
<div class="pr-info">
  <div class="pr-name">${p.name}</div>
  <div class="pr-bar-wrap"><div class="pr-bar" style="width:${Math.round(v/maxV*100)}%;background:${color}"></div></div>
</div>
<span class="pr-total">${fmtM(v)}</span>`;
    row.onclick=()=>{
      selPort=p.code;
      map.setView([p.lat,p.lng],Math.max(map.getZoom(),7),{animate:true});
      renderSidebar();
    };
    list.appendChild(row);
  });
}
function updateStats() {
  let d=0,i=0;
  PORTS.forEach(p=>{d+=domVol(p);i+=intlVol(p);});
  document.getElementById('st-dom').textContent=fmtM(d)+' TON';
  document.getElementById('st-intl').textContent=fmtM(i)+' TON';
  document.getElementById('st-cnt').textContent=PORTS.length+'개';
}
function commodityTotals(key) {
  let dU=0,dS=0,iU=0,iS=0;
  Object.values(ALL_PORT_DATA).forEach(p=>{
    const v = p.comms?.[key];
    if (v) { dU += v.dU||0; dS += v.dS||0; iU += v.iU||0; iS += v.iS||0; }
  });
  return {dU,dS,iU,iS};
}
function buildCommUI() {
  const list=document.getElementById('comm-list'); list.innerHTML='';
  COMMS.forEach(c=>{
    const nat=commodityTotals(c.key);
    const tot=(nat.dU+nat.dS+nat.iU+nat.iS)/1e6;
    const on=selComms.has(c.key);
    const row=document.createElement('div');
    row.className='comm-row'+(on?' selected':'');
    row.style.color=c.col;
    row.dataset.key=c.key;
    row.innerHTML=`<div class="chk-box">
  <svg class="chk-svg" viewBox="0 0 10 10" fill="none">
    <path d="M1.5 5L4 7.5L8.5 2.5" stroke="${c.col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>
<span class="sw" style="background:${c.col}"></span>
<span class="comm-name">${c.lbl}</span>
<span class="comm-vol">${tot.toFixed(1)}M</span>`;
    row.onclick=()=>handleCommClick(c.key);
    list.appendChild(row);
  });
  applyDisabledState();
}
function handleCommClick(key) {
  if (multiMode) {
    if (selComms.has(key)) {
      if (selComms.size===1) return;
      selComms.delete(key);
    } else {
      selComms.add(key);
    }
  } else {
    selComms = new Set([key]);
  }
  refreshCommUI();
  rebuild();
}
function setMultiModeUI() {
  document.getElementById('multi-track').classList.toggle('on', multiMode);
  document.getElementById('multi-label').style.color = multiMode ? 'var(--purple)' : '';
}
function getOgPresetKeys() {
  const available = new Set(COMMS.map(c=>c.key));
  return OG_COMMODITY_KEYS.filter(key => available.has(key));
}
function toggleOgPreset() {
  const ogKeys = getOgPresetKeys();
  if (!ogKeys.length) return;
  const isOgOnly = selComms.size === ogKeys.length && ogKeys.every(key => selComms.has(key));
  if (isOgOnly) {
    selComms = new Set([ogKeys[0]]);
    multiMode = false;
  } else {
    selComms = new Set(ogKeys);
    multiMode = true;
  }
  setMultiModeUI();
  refreshCommUI();
  rebuild();
}
function toggleAllComms() {
  const allKeys = COMMS.map(c=>c.key);
  const isAll = selComms.size === allKeys.length;
  if (isAll) {
    selComms = new Set([allKeys[0]]);
    multiMode = false;
  } else {
    selComms = new Set(allKeys);
    multiMode = true;
  }
  setMultiModeUI();
  refreshCommUI();
  rebuild();
}
function refreshCommUI() {
  const allKeys = COMMS.map(c=>c.key);
  const ogKeys = getOgPresetKeys();
  const isAll = selComms.size === allKeys.length;
  const isOgOnly = ogKeys.length && selComms.size === ogKeys.length && ogKeys.every(key => selComms.has(key));
  document.querySelectorAll('.comm-row').forEach(row=>{
    const key=row.dataset.key;
    const on=selComms.has(key);
    row.classList.toggle('selected', on);
    if (!multiMode) {
      row.classList.toggle('disabled', !on);
    } else {
      row.classList.remove('disabled');
    }
  });
  const ogBtn = document.getElementById('og-comm-btn');
  if (ogBtn) {
    ogBtn.textContent = isOgOnly ? 'O&G 해제' : 'O&G 선택';
    ogBtn.style.borderColor = isOgOnly ? 'var(--purple)' : '';
    ogBtn.style.color = isOgOnly ? 'var(--purple)' : '';
    ogBtn.style.background = isOgOnly ? 'rgba(76,29,149,.1)' : '';
  }
  const btn = document.getElementById('all-comm-btn');
  if (btn) {
    btn.textContent = isAll ? '전체 해제' : '전체 선택';
    btn.style.borderColor = isAll ? 'var(--purple)' : '';
    btn.style.color = isAll ? 'var(--purple)' : '';
    btn.style.background = isAll ? 'rgba(76,29,149,.1)' : '';
  }
}
function applyDisabledState() {
  document.querySelectorAll('.comm-row').forEach(row=>{
    if (!multiMode) {
      row.classList.toggle('disabled', !selComms.has(row.dataset.key));
    } else {
      row.classList.remove('disabled');
    }
  });
}
function toggleMulti() {
  multiMode = !multiMode;
  setMultiModeUI();
  if (!multiMode && selComms.size > 1) {
    const first=[...selComms][0];
    selComms=new Set([first]);
    refreshCommUI();
    rebuild();
  } else {
    applyDisabledState();
  }
}
function setMode(m) {
  mode=m;
  document.getElementById('mb-total').className = 'rbtn'+(m==='total'?' on-t':'');
  document.getElementById('mb-domestic').className = 'rbtn'+(m==='domestic'?' on-d':'');
  document.getElementById('mb-international').className='rbtn'+(m==='international'?' on-i':'');
  update();
}
function setSub(s) {
  sub=s;
  ['unloading','loading','both'].forEach(k=>{
    document.getElementById('sb-'+k).classList.toggle('on-s',k===s);
  });
  update();
}
function rebuild() {
  PORTS=buildPorts([...selComms]);
  update();
}
function update() {
  renderCircles();
  renderSidebar();
  updateStats();
}
async function loadData() {
  const res = await fetch('./indonesia_og_ports_data_exact.json');
  if (!res.ok) throw new Error(`JSON load failed: ${res.status}`);
  const payload = await res.json();
  ALL_PORT_DATA = payload.ports;
  COMMS = payload.commodities.map((key, idx, arr) => ({
    key,
    lbl: safeLabel(key),
    col: colorForIndex(idx, arr.length)
  }));
  selComms = new Set([COMMS.find(c => c.key === 'CPO')?.key || COMMS[0].key]);
  buildCommUI();
  rebuild();
}
loadData().catch(err => {
  console.error(err);
  alert('데이터 로드에 실패했습니다.');
});
</script>
